---
# ****************************************************************************************************
# EDITTING OF THIS FILE SHOULD BE DONE BY EXPERIENCED PERSONNEL ONLY
# ANY CHANGE WITHOUT PROPER KNOWLEDGE OF ETHERCAT DEVICE ADDRESSING CAN CAUSE DAMAGE TO THE SYSTEM
# ****************************************************************************************************
# EtherCAT addressing configuration for Veichi SD700_ECAT_V1.2_G.
# VendorID: 0x00850104  ProductCode: 0x01030507  RevisionNo: 0x02040608
#
# STATUS: bring-up stage.
#  - PDO mapping below (0x1600/0x1A00, 6+7 entries) has been empirically
#    confirmed to register successfully on real SD700 hardware (PdoJogReady=
#    true, PdoPosReady=true, cyclic task started) — this came from a config
#    mixup where Delta's YAML was accidentally loaded for this drive, but
#    since all objects referenced DO exist in SD700's dictionary (unlike
#    0x4F25 which caused the original AL 0x001E), the extended mapping itself
#    is valid. Re-verify with `ethercat states -p 0 OP` before trusting fully.
#  - dc_assign_activate is set to 0x0300 here (NOT 0x0000) — SD700's own
#    manual states "The SD700-EtherCAT servo drive only supports DC
#    synchronous mode." Free Run (0x0000) is very likely why the drive was
#    stuck in SAFEOP+E in the last test — that value came from Delta's file,
#    which explicitly allows Free Run for ITS drive, not this one.
#  - configure steps below use SD700's own init sequence (validated earlier
#    getting the drive to OP with the minimal 3-entry mapping) — NOT Delta's
#    P1-34/P1-35 (0x2122/0x2123) steps, which map to different objects
#    entirely on SD700 and caused an SDO abort (0x06090031) last run.
#  - motion: values restored to the computed SD700 numbers (23-bit encoder,
#    assumed 90:1 gearbox) — NOT Delta's rpm_const=10/drive_x_ratio=10000
#    which were wrongly injected last run. DO NOT run real motion until the
#    90:1 gearbox assumption and rpm_const are independently verified
#    (see earlier calibration steps — this has not been done empirically yet).

ethercat:
    - operation:
      name: configure
      steps:
        - step:
          name: "operation mode"
          address: 0x6060
          subindex: 0x00
          value: "1"
          delay: 0
          isBinary: false
          dataType: "U8"
        - step:
          name: "target position"
          address: 0x607A
          subindex: 0x00
          value: "100000"
          delay: 0
          isBinary: false
          dataType: "U32"
        - step:
          name: "profile velocity"
          address: 0x6081
          subindex: 0x00
          value: "1000000"
          delay: 0
          isBinary: false
          dataType: "U32"
        - step:
          name: "profile acceleration"
          address: 0x6083
          subindex: 0x00
          value: "100000000"
          delay: 0
          isBinary: false
          dataType: "U32"
        - step:
          name: "profile deceleration"
          address: 0x6084
          subindex: 0x00
          value: "100000000"
          delay: 0
          isBinary: false
          dataType: "U32"
        - step:
          name: "drive mode"
          address: 0x60F2
          subindex: 0x00
          value: "2"
          delay: 0
          isBinary: false
          dataType: "U16"
        - step:
          name: "reverse direction activate"
          address: 0x607E
          subindex: 0x00
          value: "224"
          delay: 0
          isBinary: false
          dataType: "U8"
    - operation:
      name: poweron
      steps:
        - step:
          name: "drive init"
          address: 0x6040
          subindex: 0x00
          value: "6"
          delay: 100000
          isBinary: false
          dataType: "U16"
        - step:
          name: "drive magnetize"
          address: 0x6040
          subindex: 0x00
          value: "7"
          delay: 100000
          isBinary: false
          dataType: "U16"
    - operation:
      name: fastPowerOn
      steps:
        - step:
          name: "fast poweron"
          address: 0x6040
          subindex: 0x00
          value: "0000000000001111"
          delay: 0
          isBinary: true
          dataType: "U16"
          action: "write"
    - operation:
      name: fastPowerOff
      steps:
        - step:
          name: "fast poweroff"
          address: 0x6040
          subindex: 0x00
          value: "00000110"
          delay: 0
          isBinary: true
          dataType: "U16"
          action: "write"
    - operation:
      name: poweroff
      steps:
        - step:
          name: "power off"
          address: 0x6040
          subindex: 0x00
          value: "00000110"
          delay: 0
          isBinary: true
          dataType: "U16"
    - operation:
      name: faultReset
      steps:
        - step:
          name: "fault reset"
          address: 0x6040
          subindex: 0x00
          value: "10001111"
          delay: 150000
          isBinary: true
          dataType: "U16"
          action: "write"
        - step:
          name: "clear DO"
          address: 0x60FE
          subindex: 0x01
          value: "0"
          dataType: "U32"
          action: "write"
        - step:
          name: "fault reset rising edge"
          address: 0x6040
          subindex: 0x00
          value: "10001111"
          delay: 150000
          isBinary: true
          dataType: "U16"
          action: "write"
        - step:
          name: "operation mode"
          address: 0x6060
          subindex: 0x00
          value: "1"
          delay: 0
          isBinary: false
          dataType: "U8"
          action: "write"
    - operation:
      name: readinputsignal
      steps:
        - step:
          name: "read digital inputs (0x60FD)"
          address: 0x60FD
          subindex: 0x00
          value: "0xFFFFFFFF"
          delay: 0
          isBinary: false
          dataType: "U32"
          action: "read"
    - operation:
      name: readError
      steps:
        - step:
          name: "read error from the driver"
          address: 0x603F
          subindex: 0x00
          value: "0xFFFF"
          delay: 0
          isBinary: false
          dataType: "U16"
          action: "read"
    - operation:
      name: readStatusword
      steps:
        - step:
          name: "read statusword"
          address: 0x6041
          subindex: 0x00
          value: "0xFFFF"
          delay: 0
          isBinary: false
          dataType: "U16"
          action: "read"
    - operation:
      name: reverse
      steps:
        - step:
          name: "Activate reverse direction"
          address: 0x607E
          subindex: 0x00
          value: "224"
          delay: 0
          isBinary: false
          dataType: "U8"
          action: "write"
    - operation:
      name: nonreverse
      steps:
        - step:
          name: "Activate non reverse direction"
          address: 0x607E
          subindex: 0x00
          value: "0"
          delay: 0
          isBinary: false
          dataType: "U8"
          action: "write"
    - operation:
      name: manualjog
      steps:
        - step:
          name: "target velocity"
          address: 0x60FF
          subindex: 0x00
          #value will be populated by the system. Do not change the jog_rpm_placeholder string.
          value: "jog_rpm_placeholder"
          isBinary: false
          dataType: "U32"
          delay: 0
        - step:
          name: "operation mode"
          address: 0x6060
          subindex: 0x00
          value: "0x3"
          delay: 0
          isBinary: false
          dataType: "U8"
    - operation:
      name: stopjog
      steps:
        - step:
          name: "target velocity"
          address: 0x60FF
          subindex: 0x00
          value: "0"
          isBinary: false
          dataType: "U32"
          delay: 0
    - operation:
      name: jog
      steps:
        - step:
          name: "set rotation status"
          address: 0x6040
          subindex: 0x00
          value: "0x005f"
          delay: 0
          isBinary: false
          dataType: "U16"
          action: "write"
        - step:
          name: "read rotation status"
          address: 0x6041
          subindex: 0x00
          value: "0xFFFF"
          delay: 0
          isBinary: false
          dataType: "U16"
          action: "read"
    - operation:
      name: moveToPosition
      steps:
        - step:
          name: "move to position"
          address: 0x607A
          subindex: 0x00
          value: "move_to_pos_val"
          delay: 0
          isBinary: false
          dataType: "U32"
          action: "write"
    - operation:
      name: setRPM
      steps:
        - step:
          name: "set profile velocity"
          address: 0x6081
          subindex: 0x00
          value: "rpm_val"
          delay: 0
          isBinary: false
          dataType: "U32"
          action: "write"
    # NOT YET DEFINED for SD700 — not required for jog/position testing:
    # ecs, hard_reset, finsignal, finsignalend, break_on, break_off,
    # emergency, resetMultiTurn. Add if/when this axis actually needs them.

# ============================================================
# PDO mapping — extended to 6 Rx / 7 Tx entries.
# Empirically confirmed to register successfully on real SD700 hardware
# (from the Delta-file mixup test): PdoJogReady=true, PdoPosReady=true,
# cyclic task started. All objects below exist in SD700's own dictionary
# (unlike 0x4F25, which does not exist and caused the original AL 0x001E).
# Still RE-VERIFY with `ethercat states -p 0 OP` after applying this file
# for real, since the mixup test's bus went unstable afterward for reasons
# not yet isolated (possibly the Delta-specific SDO failures upstream, or
# dc_assign_activate=0 conflicting with this drive's DC-only requirement).
# ============================================================
pdo:
  # SD700 manual (section 4.6): "only supports DC synchronous mode."
  # 0x0300 = SYNC0+SYNC1, matches the ESI's own AssignActivate recommendation.
  # DO NOT set this to 0x0000 for this drive.
  dc_assign_activate: 0x0300
  sync_managers:
    - sm: 2
      direction: output
      watchdog: enable
      pdo_index: 0x1600
      entries:
        - index: 0x6040
          subindex: 0x00
          bits: 16
          name: ctrl_word
        - index: 0x607A
          subindex: 0x00
          bits: 32
          name: target_pos
        - index: 0x60FF
          subindex: 0x00
          bits: 32
          name: target_vel
        - index: 0x6071
          subindex: 0x00
          bits: 16
          name: _pad_torque
        - index: 0x6060
          subindex: 0x00
          bits: 8
          name: op_mode
        - index: 0x60FE
          subindex: 0x01
          bits: 32
          name: dig_out_val
    - sm: 3
      direction: input
      watchdog: disable
      pdo_index: 0x1A00
      entries:
        - index: 0x6041
          subindex: 0x00
          bits: 16
          name: status_word
        - index: 0x6064
          subindex: 0x00
          bits: 32
          name: actual_pos
        - index: 0x606C
          subindex: 0x00
          bits: 32
          name: actual_vel
        - index: 0x6077
          subindex: 0x00
          bits: 16
          name: _pad_torque_actual
        - index: 0x6061
          subindex: 0x00
          bits: 8
          name: _pad_opmode_disp
        - index: 0x60FD
          subindex: 0x00
          bits: 32
          name: digital_in
        - index: 0x603F
          subindex: 0x00
          bits: 16
          name: error_code

# ============================================================
# Motion parameters.
#
# NOTE ON ENCODER RESOLUTION: earlier in this integration the motor
# nameplate was reported as a 23-bit encoder. This section now uses
# 17-bit (131,072 counts/rev) per explicit instruction — RECONFIRM this
# is correct for the actual motor on this axis (nameplate/manual) before
# trusting any motion. If it turns out to be 23-bit after all, multiply
# both values below by 64 (8,388,608 / 131,072) to get back to the
# 23-bit numbers (drive_x_ratio=2097152, rpm_const=12582912).
#
# Derivation (confirmed against drive + Veichi manual formula for 6081h/60FF,
# "motor speed = raw x (6091h-1/6091h-2) / Encoder_resolution x 60"):
#   - Read from drive: object 6091h (Gear ratio) = 1:1 — SD700 does NO
#     internal gearbox compensation itself; the 90:1 external worm gear
#     must be fully accounted for in software (drive_x_ratio/rpm_const),
#     same architecture already assumed for the 23-bit case.
#   - counts/output-rev = 131,072 (17-bit) x 90 (external gearbox) = 11,796,480
#   - drive_x_ratio (counts/degree) = 11,796,480 / 360 = 32,768
#   - rpm_const = drive_x_ratio x 6, matching this codebase's own confirmed
#     relationship (validated against the working A6B config: 20000 x 6 = 120000)
#     = 196,608
#   NOTE: rpm_const here does NOT match the old Section-13-era config's
#   49,152 for a 17-bit/90:1 setup — that's expected, not a red flag; that
#   config scheme uses different internal conventions (Feed/DriveXRatio
#   fields defined differently) and the two are not directly comparable.
#
# ASSUMES 0x60FF uses the same "command unit/s" convention as 0x6081h per
# the manual (confirmed: 60FF is documented in identical units). Still
# UNVERIFIED empirically for this drive — test at lowest possible commanded
# speed first, hand on e-stop, before trusting any larger commanded motion.
# ============================================================
motion:
  drive_x_ratio: 32768
  rpm_const: 196608